services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: klyra_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: klyra_user
      POSTGRES_PASSWORD: klyra_pass
      POSTGRES_DB: klyra_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klyra_user -d klyra_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: 
      - "postgres"
      - "-c"
      - "shared_preload_libraries=vector"

  # Optional: pgAdmin for database management (access at http://localhost:5050)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: klyra_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@klyra.local
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    profiles:
      - with-admin

volumes:
  postgres_data:
    driver: local
