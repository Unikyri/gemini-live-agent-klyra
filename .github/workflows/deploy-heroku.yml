name: Deploy to Heroku

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

env:
  HEROKU_APP: ${{ secrets.HEROKU_APP_NAME }}
  REGISTRY: registry.heroku.com

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to Heroku Container Registry
        run: echo "${{ secrets.HEROKU_API_KEY }}" | docker login -u _ --password-stdin "${{ env.REGISTRY }}"

      # Heroku registry can reject OCI/Buildx manifests as "unsupported".
      # Use classic docker build/push to publish a compatible image manifest.
      - name: Build and push web image
        run: |
          docker build -t "${{ env.REGISTRY }}/${{ env.HEROKU_APP }}/web" -f backend/Dockerfile backend
          docker push "${{ env.REGISTRY }}/${{ env.HEROKU_APP }}/web"

      - name: Build and push release image
        run: |
          docker build -t "${{ env.REGISTRY }}/${{ env.HEROKU_APP }}/release" -f backend/Dockerfile.release backend
          docker push "${{ env.REGISTRY }}/${{ env.HEROKU_APP }}/release"

      - name: Install Heroku CLI
        run: npm install -g heroku

      - name: Release containers (web + release)
        run: heroku container:release web release --app "${{ env.HEROKU_APP }}"
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}

      - name: Verify deployment health
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            sleep 10
            STATUS="$(curl -s -o /dev/null -w "%{http_code}" "https://${{ env.HEROKU_APP }}.herokuapp.com/health")"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Health check attempt $i failed (HTTP $STATUS)"
          done
          echo "::error::Health check failed after retries"
          exit 1

